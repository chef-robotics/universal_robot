# Physical parameters

offsets:
  shoulder_offset: 0.138 # measured from model
  elbow_offset: 0.007 # measured from model

inertia_parameters:
  base_mass: 4.0  # This mass might be incorrect
  shoulder_mass: 3.761
  upper_arm_mass: 8.058
  forearm_mass: 2.846
  wrist_1_mass: 1.37
  wrist_2_mass: 1.3
  wrist_3_mass: 0.365

  shoulder_radius: 0.060   # manually measured
  upper_arm_radius: 0.054  # manually measured
  elbow_radius: 0.060      # manually measured
  forearm_radius: 0.040    # manually measured
  wrist_radius: 0.045      # manually measured

  links:
    base:
      radius: 0.06
      length: 0.05

  # model referring to https://www.universal-robots.com/articles/ur/application-installation/dh-parameters-for-calculations-of-kinematics-and-dynamics/
  center_of_mass:
    shoulder_cog:
      x: 0.0        # model.x
      y: -0.00193   # -model.z
      z: -0.02561   # model.y
    upper_arm_cog:
      x: -0.2125    # model.x - upper_arm_length
      y: 0.0        # model.y
      z: 0.11336    # model.z
    forearm_cog:
      x: -0.2422    # model.x - forearm_length
      y: 0.0        # model.y
      z: 0.0265     # model.z
    wrist_1_cog:
      x: 0.0        # model.x
      y: -0.01634   # -model.z
      z: -0.0018    # model.y
    wrist_2_cog:
      x: 0.0        # model.x
      y: 0.01634    # model.z
      z: -0.0018    # -model.y
    wrist_3_cog:
      x: 0.0        # model.x
      y: 0.0        # model.y
      z: -0.001159  # model.z

  # compatible with cylinder approximation
  rotation:
    shoulder:
      roll: 0
      pitch: 0
      yaw: 0
    upper_arm:
      roll: 0
      pitch: 1.570796326794897
      yaw: 0
    forearm:
      roll: 0
      pitch: 1.570796326794897
      yaw: 0
    wrist_1:
      roll: 0
      pitch: 0
      yaw: 0
    wrist_2:
      roll: 0
      pitch: 0
      yaw: 0
    wrist_3:
      roll: 0
      pitch: 0
      yaw: 0

  # generated using cylinder approximation
  tensor:
    shoulder:
      ixx: 0.010267499999999999
      ixy: 0
      ixz: 0
      iyy: 0.010267499999999999
      iyz: 0
      izz: 0.00666
    upper_arm:
      ixx: 0.13388583541666665
      ixy: 0
      ixz: 0
      iyy: 0.13388583541666665
      iyz: 0
      izz: 0.0151074
    forearm:
      ixx: 0.03120936758333333
      ixy: 0
      ixz: 0
      iyy: 0.03120936758333333
      iyz: 0
      izz: 0.004095
    wrist_1:
      ixx: 0.0025599
      ixy: 0
      ixz: 0
      iyy: 0.0025599
      iyz: 0
      izz: 0.0021942
    wrist_2:
      ixx: 0.0025599
      ixy: 0
      ixz: 0
      iyy: 0.0025599
      iyz: 0
      izz: 0.0021942
    wrist_3:
      ixx: 9.890414008333333e-05
      ixy: 0
      ixz: 0
      iyy: 9.890414008333333e-05
      iyz: 0
      izz: 0.0001321171875

# Joint dynamics -- loaded into the `chef_dynamics` element in URDF `joint` elements.
# Frictions are in the joint/"output" reference frame, i.e. after the gear box, and are derived here:
# https://docs.google.com/spreadsheets/d/1l5ALgBcOG7bib8kCmkV5400Q8j62zNZdqExMIk1tpHg/edit?usp=sharing
# Inertias are in the motor reference frame, i.e. before the gear box, and are derived from table IV in:
# https://www.cambridge.org/core/journals/robotica/article/electromechanical-modeling-and-identification-of-the-ur5-eseries-robot/1AE5BAE866D9046F79C4B159BEA2B45F?utm_campaign=shareaholic&utm_medium=copy_link&utm_source=bookmark
joint_dynamics:
  shoulder_pan_joint:
    coulomb_friction: 0.05113  # Nm
    viscous_damping: 0.038396875  # Nm*s/rad
    gear_ratio: 101.0
    rotor_inertia: 6.6119e-05  # kg*m^2
    reducer_inertia: 10.7e-05  # kg*m^2
  shoulder_lift_joint:
    coulomb_friction: 0.094925
    viscous_damping: 0.0493984375
    gear_ratio: 101.0
    rotor_inertia: 4.6147e-05
    reducer_inertia: 10.7e-05
  elbow_joint:
    coulomb_friction: 0.07349
    viscous_damping: 0.042971875
    gear_ratio: 101.0
    rotor_inertia: 7.9773e-05
    reducer_inertia: 10.7e-05
  wrist_1_joint:
    coulomb_friction: 0.01628
    viscous_damping: 0.00835
    gear_ratio: 101.0
    rotor_inertia: 1.2249e-05
    reducer_inertia: 0.91e-05
  wrist_2_joint:
    coulomb_friction: 0.016135
    viscous_damping: 0.0076140625
    gear_ratio: 101.0
    rotor_inertia: 1.1868e-05
    reducer_inertia: 0.91e-05
  wrist_3_joint:
    coulomb_friction: 0.020835
    viscous_damping: 0.0080203125
    gear_ratio: 101.0
    rotor_inertia: 1.1981e-05
    reducer_inertia: 0.91e-05
